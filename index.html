<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VOID HOLE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:#0a0a0f;font-family:'Courier New',monospace;overflow:hidden;
    user-select:none;touch-action:none;width:100%;height:100%;position:fixed;}
  #canvas{display:block;width:100%;height:100%;touch-action:none;}

  #score-panel{position:fixed;top:env(safe-area-inset-top,16px);left:16px;
    padding-top:8px;color:#e8e0c8;font-size:9px;letter-spacing:.2em;
    text-transform:uppercase;line-height:1.9;pointer-events:none;}
  #score-panel .val{font-size:24px;font-weight:bold;color:#f0e68c;display:block;line-height:1.1;}

  #combo{position:fixed;top:env(safe-area-inset-top,16px);right:16px;
    padding-top:8px;color:#c86464;font-size:9px;letter-spacing:.2em;
    text-align:right;pointer-events:none;}
  #combo .cval{font-size:34px;font-weight:bold;display:block;line-height:1;text-shadow:0 0 16px #c8646488;}

  #size-bar-wrap{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);
    left:50%;transform:translateX(-50%);width:min(78vw,260px);
    text-align:center;color:#a09880;font-size:9px;letter-spacing:.18em;pointer-events:none;}
  #size-label{margin-bottom:5px;color:#e8e0c8;}
  #size-bar-bg{width:100%;height:4px;background:#1a1a24;border-radius:2px;overflow:hidden;}
  #size-bar{height:100%;background:linear-gradient(90deg,#4a3f8a,#c86464,#f0e68c);
    border-radius:2px;transition:width .25s ease;width:2%;}

  #msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#f0e68c;font-size:13px;letter-spacing:.22em;opacity:0;
    pointer-events:none;text-transform:uppercase;text-shadow:0 0 20px #f0e68c88;
    transition:opacity .4s;white-space:nowrap;text-align:center;}

  #hint{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 52px);
    left:50%;transform:translateX(-50%);color:#504838;font-size:9px;
    letter-spacing:.14em;pointer-events:none;transition:opacity 1.2s;white-space:nowrap;}

  /* Virtual joystick rings */
  #joy-base{position:fixed;border-radius:50%;border:1.5px solid rgba(240,230,140,.18);
    background:rgba(240,230,140,.04);pointer-events:none;z-index:30;display:none;
    transform:translate(-50%,-50%);}
  #joy-stick{position:fixed;border-radius:50%;background:rgba(240,230,140,.35);
    pointer-events:none;z-index:31;display:none;transform:translate(-50%,-50%);
    box-shadow:0 0 10px rgba(240,230,140,.4);}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="joy-base"></div>
<div id="joy-stick"></div>

<div id="score-panel">
  <span>SWALLOWED</span>
  <span class="val" id="score-val">0</span>
  <span style="margin-top:6px;display:block;">HOLE SIZE</span>
  <span class="val" id="hole-val">1.0</span>
</div>
<div id="combo"><span>COMBO</span><span class="cval" id="combo-val">×1</span></div>
<div id="size-bar-wrap">
  <div id="size-label">◈ HOLE SIZE ◈</div>
  <div id="size-bar-bg"><div id="size-bar"></div></div>
</div>
<div id="msg"></div>
<div id="hint">画面を押して指を滑らせて操作</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const W = ()=>window.innerWidth, H = ()=>window.innerHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias:false, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled = false;
renderer.setClearColor(0x0a0a0f);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0a0f, 60, 180);

// ═══════════════════════════════════════════
//  CAMERA  — angled, not perfectly top-down
//  Camera sits behind & above, looking slightly forward
//  so buildings have depth & the world feels alive.
//  Zoom: height scales with holeSize so hole = constant fraction of screen.
// ═══════════════════════════════════════════
const FOV = 52;
const TAN_HALF = Math.tan(FOV/2 * Math.PI/180);
const HOLE_FRAC = 0.10;   // hole = 10% of screen height
const PITCH = 62;         // degrees from horizontal (62° = steep but not vertical)
const PITCH_RAD = PITCH * Math.PI/180;

const camera = new THREE.PerspectiveCamera(FOV, W()/H(), 0.5, 400);

function targetCamHeight(){ return holeSize / (HOLE_FRAC * TAN_HALF); }
function updateCamera(cx, cz, ch){
  // position: back by cos(pitch)*dist, up by sin(pitch)*dist
  const dist = ch / Math.sin(PITCH_RAD);
  const back  = dist * Math.cos(PITCH_RAD);
  camera.position.set(cx, ch, cz + back);
  camera.lookAt(cx, 0, cz);
  camera.up.set(0,1,0);
}

// ═══════════════════════════════════════════
//  LIGHTS
// ═══════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x303050,3));
const sun = new THREE.DirectionalLight(0xfff8e0,2.8);
sun.position.set(0.4,1,0.6).normalize();
scene.add(sun);
const ptLight = new THREE.PointLight(0x6644cc,4,100);
scene.add(ptLight);

// ═══════════════════════════════════════════
//  GROUND  — large tiling plane
// ═══════════════════════════════════════════
const TILE = 200;
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(TILE*4,TILE*4,50,50),
  new THREE.MeshLambertMaterial({color:0x0e0e1a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
const grid = new THREE.GridHelper(TILE*4,200,0x1a1a30,0x131323);
scene.add(grid);

// ═══════════════════════════════════════════
//  HOLE STATE
// ═══════════════════════════════════════════
let holeSize = 1.0;
let holeX=0, holeZ=0;
let score=0, combo=1, comboTimer=0;
const HOLE_GROW_FACTOR = 0.18;  // growth per absorbed building

// ═══════════════════════════════════════════
//  HOLE VISUAL
// ═══════════════════════════════════════════
const holeGroup = new THREE.Group();
scene.add(holeGroup);

// dark disc
const holeDisk = new THREE.Mesh(
  new THREE.CircleGeometry(1,56),
  new THREE.MeshBasicMaterial({color:0x000000})
);
holeDisk.rotation.x=-Math.PI/2; holeDisk.position.y=0.04;
holeGroup.add(holeDisk);

// glowing rim
const holeRim = new THREE.Mesh(
  new THREE.RingGeometry(1,1.14,56),
  new THREE.MeshBasicMaterial({color:0xf0e68c,side:THREE.DoubleSide})
);
holeRim.rotation.x=-Math.PI/2; holeRim.position.y=0.05;
holeGroup.add(holeRim);

for(let i=0;i<3;i++){
  const r=new THREE.Mesh(
    new THREE.RingGeometry(1.18+i*.28,1.32+i*.28,56),
    new THREE.MeshBasicMaterial({color:0x4a3f8a,transparent:true,opacity:.10-i*.03,side:THREE.DoubleSide})
  );
  r.rotation.x=-Math.PI/2; r.position.y=0.02; r.userData.gi=i;
  holeGroup.add(r);
}

function updateHoleVisual(){
  holeDisk.scale.set(holeSize,holeSize,holeSize);
  holeGroup.children.forEach(c=>{
    if(c.userData.gi!=null){const b=1+c.userData.gi*.28;c.scale.set(holeSize*b,holeSize*b,holeSize*b);}
  });
  holeGroup.position.set(holeX,0,holeZ);
  ptLight.position.set(holeX,6,holeZ);
  ptLight.color.setHSL((score*0.04)%1,.7,.55);
  ptLight.distance = Math.max(50,holeSize*15);
}

// ═══════════════════════════════════════════
//  VOXEL BUILDINGS
//  Each builder returns a THREE.Group at origin, base on y=0
// ═══════════════════════════════════════════
const PALETTES = {
  house:   [[0xc8a060,0x8a6030],[0xe8e0c0,0xc0b890],[0xcc6644,0x993322]],
  tall:    [[0x6080b0,0x405880],[0x88aacc,0x607090],[0x334466,0x223355]],
  doghouse:[[0xb07840,0x7a5020],[0xddccaa,0xbbaa80],[0x884422,0x662200]],
  church:  [[0xe8e4d8,0xc0bca8],[0xaaaaaa,0x888888],[0x8866aa,0x664488]],
  shop:    [[0xff9966,0xcc6633],[0xffeecc,0xddc898],[0x4488cc,0x226699]],
  factory: [[0x889988,0x556655],[0xbbccbb,0x8a9a8a],[0xcc4444,0x882222]],
};

// helper: add box to group
function box(g, color, x,y,z, w,h,d){
  const m=new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color})
  );
  m.position.set(x,y+h/2,z);
  g.add(m);
  return m;
}

function buildHouse(s, pal){
  const g=new THREE.Group();
  const [wall,roof,door]=pal;
  // body
  box(g,wall[0],  0,0,0,  s,s*.8,s);
  // roof (pyramid via cone)
  const roofM=new THREE.Mesh(
    new THREE.ConeGeometry(s*.75,s*.6,4),
    new THREE.MeshLambertMaterial({color:roof[0]})
  );
  roofM.position.set(0,s*.8+s*.3,0);
  roofM.rotation.y=Math.PI/4;
  g.add(roofM);
  // door
  box(g,door[0],  0,0,s*.5+.01, s*.22,s*.35,0.01);
  // window L
  box(g,door[1],  -s*.28,s*.35,s*.5+.01, s*.18,s*.18,0.01);
  // window R
  box(g,door[1],   s*.28,s*.35,s*.5+.01, s*.18,s*.18,0.01);
  return g;
}

function buildDoghouse(s, pal){
  const g=new THREE.Group();
  const [wall,roof,door]=pal;
  box(g,wall[0], 0,0,0, s*.9,s*.65,s*.9);
  // roof
  const roofM=new THREE.Mesh(
    new THREE.ConeGeometry(s*.68,s*.5,4),
    new THREE.MeshLambertMaterial({color:roof[0]})
  );
  roofM.position.set(0,s*.65+s*.25,0);
  roofM.rotation.y=Math.PI/4;
  g.add(roofM);
  // circular door
  const dg=new THREE.Mesh(new THREE.CircleGeometry(s*.2,16),new THREE.MeshLambertMaterial({color:door[0]}));
  dg.rotation.x=-Math.PI/2+Math.PI/2; // face front
  dg.position.set(0,s*.24,s*.45+.01);
  g.add(dg);
  return g;
}

function buildTower(s, pal){
  const g=new THREE.Group();
  const [wall,glass,accent]=pal;
  const floors=3+Math.floor(s/1.5);
  const fh=s*.5;
  for(let i=0;i<floors;i++){
    box(g,wall[0], 0,i*fh,0, s*.8,fh*.9,s*.8);
    // window rows
    box(g,glass[0], 0,i*fh+fh*.35,s*.4+.01, s*.5,fh*.3,.01);
  }
  // rooftop box
  box(g,accent[0], 0,floors*fh,0, s*.3,s*.3,s*.3);
  return g;
}

function buildChurch(s, pal){
  const g=new THREE.Group();
  const [wall,stone,accent]=pal;
  box(g,wall[0], 0,0,0, s,s*.8,s*1.2);
  // steeple base
  box(g,stone[0], 0,s*.8,0, s*.35,s*.5,s*.35);
  // steeple tip
  const tip=new THREE.Mesh(
    new THREE.ConeGeometry(s*.22,s*.7,4),
    new THREE.MeshLambertMaterial({color:accent[0]})
  );
  tip.position.set(0,s*.8+s*.5+s*.35,0);
  tip.rotation.y=Math.PI/4;
  g.add(tip);
  // cross
  box(g,accent[1], 0,s*2.1,0, s*.06,s*.28,s*.06);
  box(g,accent[1], 0,s*2.18,0, s*.2,s*.06,s*.06);
  // arched door area
  box(g,stone[1], 0,0,s*.6+.01, s*.28,s*.4,.01);
  return g;
}

function buildShop(s, pal){
  const g=new THREE.Group();
  const [front,wall,awning]=pal;
  box(g,wall[0], 0,0,0, s,s*.75,s*.8);
  // large front window
  box(g,awning[0], 0,s*.28,s*.4+.01, s*.7,s*.3,.01);
  // awning
  const awn=new THREE.Mesh(
    new THREE.BoxGeometry(s*1.1,.06,s*.35),
    new THREE.MeshLambertMaterial({color:front[0]})
  );
  awn.position.set(0,s*.58,s*.57);
  g.add(awn);
  // sign
  box(g,front[1], 0,s*.65,s*.4+.01, s*.6,s*.12,.01);
  return g;
}

function buildFactory(s, pal){
  const g=new THREE.Group();
  const [body,roof,chimney]=pal;
  box(g,body[0], 0,0,0, s*1.3,s*.6,s);
  box(g,roof[0], 0,s*.6,0, s*1.3,.08,s);
  // chimneys
  box(g,chimney[0], -s*.35,s*.6,s*.1, s*.18,s*.7,s*.18);
  box(g,chimney[0],  s*.25,s*.6,s*.1, s*.14,s*.5,s*.14);
  // smoke cap
  box(g,chimney[1], -s*.35,s*1.3,s*.1, s*.24,.06,s*.24);
  // windows
  for(let i=0;i<3;i++) box(g,body[1], -s*.4+i*s*.4,s*.22,s*.5+.01, s*.2,s*.2,.01);
  return g;
}

const BUILDERS = [
  (s)=>buildHouse(s,     PALETTES.house.map(p=>[...p])),
  (s)=>buildDoghouse(s,  PALETTES.doghouse.map(p=>[...p])),
  (s)=>buildTower(s,     PALETTES.tall.map(p=>[...p])),
  (s)=>buildChurch(s,    PALETTES.church.map(p=>[...p])),
  (s)=>buildShop(s,      PALETTES.shop.map(p=>[...p])),
  (s)=>buildFactory(s,   PALETTES.factory.map(p=>[...p])),
];

// ═══════════════════════════════════════════
//  OBJECT POOL
// ═══════════════════════════════════════════
const objects = [];
const MAX_OBJ = 80;
const SPAWN_RADIUS_MIN = 6;
const SPAWN_RADIUS_MAX = 55;

function spawnObject(){
  if(objects.length>=MAX_OBJ) return;
  // size: always slightly larger than hole at smallest so player can grow,
  // but mostly smaller so there's always something to eat
  const minSize = Math.max(0.25, holeSize*0.15);
  const maxSize = holeSize*2.8 + 1.0;
  const size = minSize + Math.random()*(maxSize-minSize);
  const builderIdx = Math.floor(Math.random()*BUILDERS.length);
  const mesh = BUILDERS[builderIdx](size);
  mesh.userData.buildType = builderIdx;

  const ang  = Math.random()*Math.PI*2;
  const dist = SPAWN_RADIUS_MIN + Math.random()*(SPAWN_RADIUS_MAX + holeSize*8);
  mesh.position.set(
    holeX + Math.cos(ang)*dist,
    0,
    holeZ + Math.sin(ang)*dist
  );
  mesh.rotation.y = Math.random()*Math.PI*2;
  scene.add(mesh);

  // dominant color for particles
  const palKey = Object.keys(PALETTES)[builderIdx % Object.keys(PALETTES).length];
  const partColor = PALETTES[palKey][0][0];

  objects.push({
    mesh, size, partColor,
    vx:0, vz:0,
    rotSpeed:(Math.random()-.5)*.008,
    falling:false, fallTarget:null, absorbed:false,
    bobPhase:Math.random()*Math.PI*2,
  });
}

// ensure minimum count near player
function maintainObjects(){
  // cull absorbed
  for(let i=objects.length-1;i>=0;i--){
    if(objects[i].absorbed) objects.splice(i,1);
  }
  // cull very far objects (> 3x spawn radius)
  const cullDist = SPAWN_RADIUS_MAX*3 + holeSize*20;
  for(let i=objects.length-1;i>=0;i--){
    const o=objects[i];
    if(o.falling||o.absorbed) continue;
    const dx=o.mesh.position.x-holeX, dz=o.mesh.position.z-holeZ;
    if(Math.sqrt(dx*dx+dz*dz)>cullDist){
      scene.remove(o.mesh);
      objects.splice(i,1);
    }
  }
  // spawn until full
  const needed = MAX_OBJ - objects.length;
  for(let i=0;i<Math.min(needed,8);i++) spawnObject();
}

// ═══════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════
const particles=[];
function spawnParticles(x,z,color){
  for(let i=0;i<10;i++){
    const m=new THREE.Mesh(
      new THREE.BoxGeometry(.14,.14,.14),
      new THREE.MeshBasicMaterial({color,transparent:true})
    );
    m.position.set(x,.6,z);
    scene.add(m);
    particles.push({
      mesh:m,
      vx:(Math.random()-.5)*.26,
      vy:.08+Math.random()*.16,
      vz:(Math.random()-.5)*.26,
      life:38+Math.random()*20,
      maxLife:58,
    });
  }
}

// ═══════════════════════════════════════════
//  VIRTUAL JOYSTICK INPUT
//  Press anywhere → that point becomes the joystick base.
//  Drag → direction & magnitude control hole velocity.
//  Release → hole drifts to stop.
// ═══════════════════════════════════════════
const joyBase  = document.getElementById('joy-base');
const joyStick = document.getElementById('joy-stick');

const JOY_RADIUS = Math.min(W(),H()) * 0.14;  // dead zone / max radius

let joyActive = false;
let joyOriginX=0, joyOriginY=0;   // screen coords of touch start
let joyDX=0, joyDZ=0;             // current direction in world units/frame

function updateJoySize(){
  const r = Math.min(W(),H()) * 0.14;
  const s = r*2;
  joyBase.style.width  = s+'px';
  joyBase.style.height = s+'px';
  const ss = r*.38+'px';
  joyStick.style.width  = ss;
  joyStick.style.height = ss;
}
updateJoySize();

function joyMove(cx,cy){
  let dx = cx - joyOriginX;
  let dy = cy - joyOriginY;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const radius = Math.min(W(),H()) * 0.14;
  const clamp = Math.min(dist, radius);
  const nx = dist>0 ? dx/dist : 0;
  const ny = dist>0 ? dy/dist : 0;
  const ratio = clamp/radius;  // 0..1

  // stick visual
  joyStick.style.left = (joyOriginX + nx*clamp)+'px';
  joyStick.style.top  = (joyOriginY + ny*clamp)+'px';

  // world velocity: screen +X → world +X, screen +Y → world +Z
  const speed = holeSize * 0.08 + 0.06;
  joyDX = nx * ratio * speed;
  joyDZ = ny * ratio * speed;
}

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.touches[0];
  joyActive=true;
  joyOriginX=t.clientX; joyOriginY=t.clientY;
  joyDX=0; joyDZ=0;
  joyBase.style.display='block';
  joyStick.style.display='block';
  joyBase.style.left=t.clientX+'px';
  joyBase.style.top=t.clientY+'px';
  joyStick.style.left=t.clientX+'px';
  joyStick.style.top=t.clientY+'px';
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t=e.touches[0];
  joyMove(t.clientX, t.clientY);
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  joyActive=false;
  joyDX=0; joyDZ=0;
  joyBase.style.display='none';
  joyStick.style.display='none';
},{passive:false});

// Mouse fallback (drag)
let mouseDown=false, mox=0, moy=0;
canvas.addEventListener('mousedown', e=>{
  mouseDown=true;
  mox=e.clientX; moy=e.clientY;
  joyOriginX=mox; joyOriginY=moy;
  joyActive=true;
  joyBase.style.display='block';
  joyStick.style.display='block';
  joyBase.style.left=mox+'px';
  joyBase.style.top=moy+'px';
  joyStick.style.left=mox+'px';
  joyStick.style.top=moy+'px';
});
canvas.addEventListener('mousemove', e=>{
  if(!mouseDown) return;
  joyMove(e.clientX,e.clientY);
});
canvas.addEventListener('mouseup', ()=>{
  mouseDown=false; joyActive=false; joyDX=0; joyDZ=0;
  joyBase.style.display='none'; joyStick.style.display='none';
});
canvas.addEventListener('mouseleave', ()=>{
  mouseDown=false; joyActive=false; joyDX=0; joyDZ=0;
  joyBase.style.display='none'; joyStick.style.display='none';
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
for(let i=0;i<50;i++) spawnObject();

const scoreEl=document.getElementById('score-val');
const holeEl =document.getElementById('hole-val');
const comboEl=document.getElementById('combo-val');
const sizeBar=document.getElementById('size-bar');
const msgEl  =document.getElementById('msg');

let camX=0,camZ=0,camH=targetCamHeight();

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
let frame=0;
function animate(){
  requestAnimationFrame(animate);
  frame++;

  // ── hole movement from joystick ──
  holeX += joyDX;
  holeZ += joyDZ;

  // ── update hole visual ──
  updateHoleVisual();

  // ── camera ──
  const tH = targetCamHeight();
  camH += (tH-camH)*.05;
  camX += (holeX-camX)*.08;
  camZ += (holeZ-camZ)*.08;
  updateCamera(camX, camZ, camH);

  // fog scales with camera distance
  scene.fog.near = camH * 1.8;
  scene.fog.far  = camH * 5;

  // ── ground tile ──
  const TG = 200;
  ground.position.x = Math.round(camX/TG)*TG;
  ground.position.z = Math.round(camZ/TG)*TG;
  grid.position.x   = ground.position.x;
  grid.position.z   = ground.position.z;

  // ── objects ──
  objects.forEach(obj=>{
    if(obj.absorbed) return;
    if(obj.falling){
      obj.mesh.position.x += (obj.fallTarget.x - obj.mesh.position.x)*.14;
      obj.mesh.position.z += (obj.fallTarget.z - obj.mesh.position.z)*.14;
      obj.mesh.position.y -= .22;
      obj.mesh.scale.multiplyScalar(.905);
      obj.mesh.rotation.y += .22;
      obj.mesh.rotation.x += .10;
      if(obj.mesh.position.y < -8 || obj.mesh.scale.x < .03){
        scene.remove(obj.mesh);
        obj.absorbed=true;
        holeSize += obj.size * HOLE_GROW_FACTOR;
        score++;
        scoreEl.textContent=score;
        holeEl.textContent=holeSize.toFixed(1);
        spawnParticles(holeX,holeZ,obj.partColor);
        // size bar: logarithmic so it doesn't fill instantly
        const pct = Math.min(99, Math.log2(holeSize+1)/Math.log2(30)*98+1);
        sizeBar.style.width=pct+'%';
        // milestone messages
        if(score===5)  showMsg('◈ GROWING ◈');
        if(score===20) showMsg('◈ UNSTOPPABLE ◈');
        if(score===50) showMsg('◈ COLOSSAL ◈');
        if(score===100)showMsg('◈ THE VOID CONSUMES ALL ◈');
      }
    } else {
      // slight bob
      obj.mesh.position.y = Math.sin(frame*.016+obj.bobPhase)*.08;
      obj.mesh.rotation.y += obj.rotSpeed;
      // suction toward hole if smaller
      const dx=holeX-obj.mesh.position.x, dz=holeZ-obj.mesh.position.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      const sR=holeSize*3.5;
      if(dist<sR && obj.size<holeSize){
        const f=(1-dist/sR)*.055;
        obj.mesh.position.x+=dx*f;
        obj.mesh.position.z+=dz*f;
      }
    }
  });

  // ── auto absorb ──
  if(frame%2===0){
    objects.forEach(obj=>{
      if(obj.absorbed||obj.falling) return;
      const dx=obj.mesh.position.x-holeX, dz=obj.mesh.position.z-holeZ;
      if(obj.size<holeSize && Math.sqrt(dx*dx+dz*dz)<holeSize*.88){
        obj.falling=true;
        obj.fallTarget={x:holeX,z:holeZ};
        comboTimer=220;
      }
    });
  }

  // ── particles ──
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.mesh.position.x+=p.vx; p.mesh.position.y+=p.vy; p.mesh.position.z+=p.vz;
    p.vy-=.005; p.life--;
    p.mesh.material.opacity=p.life/p.maxLife;
    if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}
  }

  // ── combo ──
  if(comboTimer>0){comboTimer--;if(!comboTimer)combo=1;}
  comboEl.textContent='×'+combo;

  // ── spawn maintenance every 60 frames ──
  if(frame%60===0) maintainObjects();

  // ── rim pulse ──
  const pulse=1+Math.sin(frame*.09)*.032;
  holeRim.scale.set(holeSize*pulse,holeSize*pulse,holeSize*pulse);

  renderer.render(scene,camera);
}

function showMsg(txt){
  msgEl.textContent=txt;
  msgEl.style.opacity='1';
  setTimeout(()=>{msgEl.style.opacity='0';},2000);
}

animate();

window.addEventListener('resize',()=>{
  updateJoySize();
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

setTimeout(()=>{document.getElementById('hint').style.opacity='0';},5000);
</script>
</body>
</html>
