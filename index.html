<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VOID HOLE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;user-select:none;
  touch-action:none;position:fixed;background:#000;
  font-family:'Courier New',monospace;}
#c{display:block;width:100%;height:100%;touch-action:none;}

/* ── HUD ── */
#lv-name{position:fixed;top:env(safe-area-inset-top,0);left:0;right:0;
  text-align:center;padding-top:13px;font-size:10px;letter-spacing:.3em;
  text-transform:uppercase;color:#f0e68c;pointer-events:none;
  text-shadow:0 0 10px #f0e68c99,0 1px 4px #0008;}

#sp{position:fixed;top:env(safe-area-inset-top,0);left:13px;padding-top:13px;
  color:#b8b090;font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  line-height:2;pointer-events:none;text-shadow:0 1px 4px #0009;}
#sp .v{font-size:20px;font-weight:700;color:#f0e68c;display:block;line-height:1.1;}

#cb{position:fixed;top:env(safe-area-inset-top,0);right:13px;padding-top:13px;
  color:#c86464;font-size:8px;letter-spacing:.18em;text-align:right;
  pointer-events:none;text-shadow:0 1px 4px #0009;}
#cb .v{font-size:28px;font-weight:700;display:block;line-height:1;
  text-shadow:0 0 14px #c8646466;}

#pw{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
  left:50%;transform:translateX(-50%);width:min(78vw,280px);
  text-align:center;font-size:8px;letter-spacing:.17em;pointer-events:none;}
#pl{margin-bottom:4px;color:#b8b090;text-shadow:0 1px 3px #000a;}
#pbg{width:100%;height:5px;background:#18161e;border-radius:3px;overflow:hidden;}
#pb{height:100%;width:0%;border-radius:3px;transition:width .28s ease;}
#ps{margin-top:3px;color:#383028;text-shadow:0 1px 2px #000a;}

#lu{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none;
  opacity:0;transition:opacity .5s;z-index:50;background:rgba(0,0,0,.35);}
#lu-t{font-size:26px;letter-spacing:.3em;color:#f0e68c;
  text-shadow:0 0 28px #f0e68ccc;text-transform:uppercase;margin-bottom:8px;}
#lu-s{font-size:9px;letter-spacing:.25em;color:#b8b090;text-transform:uppercase;}

#msg{position:fixed;top:44%;left:50%;transform:translateX(-50%);
  color:#f0e68c;font-size:12px;letter-spacing:.22em;opacity:0;white-space:nowrap;
  pointer-events:none;text-transform:uppercase;transition:opacity .4s;
  text-shadow:0 0 16px #f0e68c99,0 1px 4px #000c;}

#hint{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 48px);
  left:50%;transform:translateX(-50%);color:#38302800;font-size:8px;
  letter-spacing:.14em;pointer-events:none;transition:opacity 1s;
  white-space:nowrap;opacity:.7;}

/* joystick */
#jb{position:fixed;border-radius:50%;pointer-events:none;z-index:30;display:none;
  transform:translate(-50%,-50%);
  border:1.5px solid rgba(240,230,140,.18);background:rgba(240,230,140,.04);}
#js{position:fixed;border-radius:50%;pointer-events:none;z-index:31;display:none;
  transform:translate(-50%,-50%);background:rgba(240,230,140,.32);
  box-shadow:0 0 10px rgba(240,230,140,.35);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="jb"></div><div id="js"></div>

<div id="lv-name">◈ VILLAGE ◈</div>
<div id="sp"><span>SWALLOWED</span><span class="v" id="sv">0</span>
  <span style="margin-top:3px;display:block;">HOLE SIZE</span><span class="v" id="hv">1.0</span></div>
<div id="cb"><span>COMBO</span><span class="v" id="cv">×1</span></div>
<div id="pw"><div id="pl">NEXT LEVEL</div>
  <div id="pbg"><div id="pb"></div></div><div id="ps">0 / 0</div></div>
<div id="lu"><div id="lu-t"></div><div id="lu-s"></div></div>
<div id="msg"></div>
<div id="hint">画面を押して指を滑らせて操作</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════════════════
//  LEVEL DEFINITIONS
// ══════════════════════════════════════════════════════════════
const LEVELS = [
  { name:'VILLAGE',    jp:'むら',
    holeMax:3.8,  toNextBase:10,
    sky:0x0d1f0a,  ground:0x182412, road:0x26281e, roadW:0.9,
    roadSpacing:16, buildGap:3.2, objScale:1.0,
    fogF:11, barCol:'#5cb835',
    types:['house','doghouse','shed','tree'],
    ambient:0x304028, sunCol:0xfff0cc, sunInt:2.2,
  },
  { name:'TOWN',       jp:'まち',
    holeMax:7.5,  toNextBase:18,
    sky:0x0a1810,  ground:0x14201a, road:0x282520, roadW:1.1,
    roadSpacing:24, buildGap:5.0, objScale:1.5,
    fogF:12, barCol:'#35b87a',
    types:['house','shop','church','silo','tree'],
    ambient:0x283830, sunCol:0xfff4d0, sunInt:2.3,
  },
  { name:'CITY',       jp:'とし',
    holeMax:16,   toNextBase:38,
    sky:0x08101a,  ground:0x10141e, road:0x242428, roadW:1.8,
    roadSpacing:42, buildGap:10, objScale:3.0,
    fogF:13, barCol:'#3878c8',
    types:['tower','skyscraper','shop','factory'],
    ambient:0x202838, sunCol:0xeef4ff, sunInt:2.4,
  },
  { name:'PREFECTURE',jp:'けん',
    holeMax:32,   toNextBase:65,
    sky:0x0c100e,  ground:0x141210, road:0x242220, roadW:3.0,
    roadSpacing:80, buildGap:22, objScale:7.0,
    fogF:13, barCol:'#c8a030',
    types:['skyscraper','factory','stadium','bridge'],
    ambient:0x282020, sunCol:0xffe8c0, sunInt:2.2,
  },
  { name:'COUNTRY',   jp:'くに',
    holeMax:65,   toNextBase:100,
    sky:0x080808,  ground:0x101010, road:0x1e1e1e, roadW:5.0,
    roadSpacing:160, buildGap:48, objScale:16.0,
    fogF:14, barCol:'#c85030',
    types:['mountain','stadium','skyscraper','factory'],
    ambient:0x202020, sunCol:0xffe0b0, sunInt:2.1,
  },
  { name:'EARTH',     jp:'ちきゅう',
    holeMax:120,  toNextBase:140,
    sky:0x04080e,  ground:0x080c12, road:0x161820, roadW:8.0,
    roadSpacing:320, buildGap:100, objScale:36.0,
    fogF:14, barCol:'#3060ee',
    types:['continent','ocean','cloud','satellite'],
    ambient:0x141828, sunCol:0xd0e8ff, sunInt:2.0,
  },
  { name:'PLANET',    jp:'わくせい',
    holeMax:9999, toNextBase:200,
    sky:0x040208,  ground:0x080408, road:0x141014, roadW:14.0,
    roadSpacing:600, buildGap:200, objScale:80.0,
    fogF:15, barCol:'#b030cc',
    types:['crater','volcano','asteroid','iceberg'],
    ambient:0x181018, sunCol:0xeec8ff, sunInt:1.9,
  },
];

// ══════════════════════════════════════════════════════════════
//  RENDERER
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const W = ()=>window.innerWidth, H = ()=>window.innerHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias:false,
  powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();

// Camera — pitched view (not top-down)
const FOV = 52, TAN_H = Math.tan(FOV/2 * Math.PI/180);
const HOLE_FRAC = 0.10;   // hole = 10% of screen height
const PITCH = 62 * Math.PI/180;
const camera = new THREE.PerspectiveCamera(FOV, W()/H(), 0.3, 3000);

function camH4hole(hs){ return Math.max(3, hs / (HOLE_FRAC * TAN_H)); }
function setCamera(cx, cz, ch){
  const d = ch / Math.sin(PITCH);
  camera.position.set(cx, ch, cz + d * Math.cos(PITCH));
  camera.lookAt(cx, 0, cz);
  camera.up.set(0,1,0);
}

// ── Lights — hemisphere + directional only (no distance-limited point lights)
const hemi = new THREE.HemisphereLight(0xfff0cc, 0x304028, 2.2);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff0cc, 2.2);
sun.position.set(0.5, 1, 0.6).normalize();
scene.add(sun);
// Fill light attached to camera position — always illuminates scene evenly
const fill = new THREE.DirectionalLight(0xffffff, 0.8);
fill.position.set(-1, 0.5, -1).normalize();
scene.add(fill);

function applyLevelLighting(lv){
  hemi.color.setHex(lv.sunCol);
  hemi.groundColor.setHex(lv.ambient);
  hemi.intensity = lv.sunInt;
  sun.color.setHex(lv.sunCol);
  sun.intensity = lv.sunInt * 0.9;
}

// ══════════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════════
let holeSize = 1.2, holeX = 0, holeZ = 0;
let score = 0, combo = 1, comboTimer = 0;
let lvIdx = 0, lvAbs = 0, lvupActive = false;
const lv = () => LEVELS[Math.min(lvIdx, LEVELS.length-1)];
const neededForNext = () => lv().toNextBase + Math.floor(holeSize * 3.5);
function growAmt(sz){
  const r = sz / holeSize;
  return sz * 0.055 * Math.max(0.03, Math.min(1, r));
}

// ══════════════════════════════════════════════════════════════
//  GROUND + ROADS
//  Roads are a grid of flat planes, chunk-snapped to follow camera
// ══════════════════════════════════════════════════════════════
const GROUND_TILE = 600;
const groundMat = new THREE.MeshLambertMaterial({color: LEVELS[0].ground});
const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(GROUND_TILE*3, GROUND_TILE*3, 2, 2), groundMat);
groundMesh.rotation.x = -Math.PI/2;
groundMesh.position.y = -0.02;
scene.add(groundMesh);

const roadGroup = new THREE.Group();
scene.add(roadGroup);
const roadMat = new THREE.MeshLambertMaterial({color: LEVELS[0].road});
const ROAD_LINES = 16; // lines in each direction
let roadSpacing = LEVELS[0].roadSpacing;

function buildRoadMeshes(lvData){
  while(roadGroup.children.length) roadGroup.remove(roadGroup.children[0]);
  roadMat.color.setHex(lvData.road);
  roadSpacing = lvData.roadSpacing;
  const sp = roadSpacing;
  const rw = Math.max(0.4, lvData.roadW);
  const len = sp * (ROAD_LINES + 2);
  for(let i = -ROAD_LINES/2; i <= ROAD_LINES/2; i++){
    // along X
    const mz = new THREE.Mesh(new THREE.PlaneGeometry(len, rw), roadMat);
    mz.rotation.x = -Math.PI/2; mz.position.set(0, 0.01, i*sp);
    roadGroup.add(mz);
    // along Z
    const mx = new THREE.Mesh(new THREE.PlaneGeometry(rw, len), roadMat);
    mx.rotation.x = -Math.PI/2; mx.position.set(i*sp, 0.01, 0);
    roadGroup.add(mx);
  }
}
buildRoadMeshes(LEVELS[0]);

function snapRoads(cx, cz){
  const sp = roadSpacing;
  roadGroup.position.x = Math.round(cx/sp)*sp;
  roadGroup.position.z = Math.round(cz/sp)*sp;
}

// ══════════════════════════════════════════════════════════════
//  PROCEDURAL BUILDING CHUNKS
//  World is divided into chunks. Each chunk is generated once,
//  placed along road edges, and cached by "cx,cz" key.
// ══════════════════════════════════════════════════════════════
const chunkCache = new Map();  // "cx,cz" → [meshes]
const CHUNK_LOAD_R = 3;        // chunks visible in each direction

function chunkKey(cx, cz){ return cx+','+cz; }

// seeded random: returns 0..1 based on seed integers
function srand(a, b, c){
  let x = Math.sin(a*127.1 + b*311.7 + (c||0)*74.3) * 43758.5453;
  return x - Math.floor(x);
}

// ── VOXEL BUILDERS ──────────────────────────────────────────
function bx(g, col, x,y,z, w,h,d){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x, y+h/2, z); g.add(m);
}
function cn(g, col, x,y,z, r,h, seg=4, ry=Math.PI/4){
  const m = new THREE.Mesh(
    new THREE.ConeGeometry(r,h,seg),
    new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x, y+h/2, z); m.rotation.y=ry; g.add(m);
}
function cy(g, col, x,y,z, r,h){
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(r,r,h,8),
    new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x, y+h/2, z); g.add(m);
}
function sp(g, col, x,y,z, r){
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(r,7,5),
    new THREE.MeshLambertMaterial({color:col}));
  m.position.set(x,y,z); g.add(m);
}

const BUILDERS = {
  house(s){
    const g=new THREE.Group();
    bx(g,0xc8a060, 0,0,0, s,s*.78,s);
    cn(g,0xcc5533, 0,s*.78,0, s*.74,s*.62);
    bx(g,0x553311, 0,0,s*.5+.01, s*.22,s*.38,.01);
    bx(g,0x88ccee,-s*.27,s*.3,s*.5+.01, s*.19,s*.19,.01);
    bx(g,0x88ccee, s*.27,s*.3,s*.5+.01, s*.19,s*.19,.01);
    return g;
  },
  doghouse(s){
    const g=new THREE.Group();
    bx(g,0xb07030, 0,0,0, s*.88,s*.62,s*.88);
    cn(g,0x883322, 0,s*.62,0, s*.68,s*.52);
    bx(g,0x221100, 0,0,s*.44+.01, s*.32,s*.38,.01);
    return g;
  },
  shed(s){
    const g=new THREE.Group();
    bx(g,0x7a5c30, 0,0,0, s*.92,s*.52,s*.72);
    bx(g,0x5a4020, 0,s*.52,0, s*.92,.07,s*.72);
    bx(g,0x3a2810, 0,s*.28,s*.36+.01, s*.36,s*.38,.01);
    return g;
  },
  tree(s){
    const g=new THREE.Group();
    cy(g,0x5a3818, 0,0,0, s*.12,s*.55);
    cn(g,0x3a7830, 0,s*.45,0, s*.55,s*.8, 6, 0);
    cn(g,0x2a6020, 0,s*.9,0, s*.4,s*.65, 6, 0);
    return g;
  },
  silo(s){
    const g=new THREE.Group();
    cy(g,0xd0c8a0, 0,0,0, s*.4,s*1.4);
    cn(g,0xaa8830, 0,s*1.4,0, s*.44,s*.5, 8, 0);
    return g;
  },
  shop(s){
    const g=new THREE.Group();
    bx(g,0xe8c070, 0,0,0, s,s*.72,s*.82);
    bx(g,0x88ccff, 0,s*.22,s*.41+.01, s*.72,s*.32,.01);
    const aw=new THREE.Mesh(new THREE.BoxGeometry(s*1.1,.06,s*.38),
      new THREE.MeshLambertMaterial({color:0xee5533}));
    aw.position.set(0,s*.6,s*.6); g.add(aw);
    bx(g,0xffddcc, 0,s*.65,s*.41+.01, s*.6,s*.1,.01);
    return g;
  },
  church(s){
    const g=new THREE.Group();
    bx(g,0xe8e0d0, 0,0,0, s,s*.82,s*1.25);
    bx(g,0xcccccc, 0,s*.82,0, s*.34,s*.52,s*.34);
    cn(g,0x8866aa, 0,s*1.34,0, s*.24,s*.72, 4);
    bx(g,0xcccccc, 0,s*1.8,0, .07*s,s*.3,.07*s);
    bx(g,0xcccccc, 0,s*1.88,0, s*.22,.07*s,.07*s);
    bx(g,0x7799cc, 0,0,s*.62+.01, s*.32,s*.44,.01);
    return g;
  },
  tower(s){
    const g=new THREE.Group();
    const fl=3+Math.floor(s*.55), fh=s*.44;
    for(let i=0;i<fl;i++){
      bx(g,i%2===0?0x5878aa:0x3a5880, 0,i*fh,0, s*.76,fh*.92,s*.76);
      bx(g,0x88ccee, 0,i*fh+fh*.38,s*.38+.01, s*.52,fh*.32,.01);
    }
    bx(g,0xcc3333, 0,fl*fh,0, s*.3,s*.42,s*.3);
    return g;
  },
  skyscraper(s){
    const g=new THREE.Group();
    const fl=5+Math.floor(s*.42), fh=s*.36;
    for(let i=0;i<fl;i++){
      bx(g,0x5a6880, 0,i*fh,0, s*.68,fh*.9,s*.68);
      if(i%2===0){
        bx(g,0x99ccee,-s*.22,i*fh+fh*.3,s*.34+.01, s*.3,fh*.42,.01);
        bx(g,0x99ccee, s*.22,i*fh+fh*.3,s*.34+.01, s*.3,fh*.42,.01);
      }
    }
    cn(g,0x888888, 0,fl*fh,0, s*.13,s*.65, 8, 0);
    return g;
  },
  factory(s){
    const g=new THREE.Group();
    bx(g,0x7a8878, 0,0,0, s*1.35,s*.58,s);
    bx(g,0x5a6858, 0,s*.58,0, s*1.35,.08,s);
    cy(g,0xaa4422,-s*.4,s*.58,s*.1, s*.11,s*.82);
    cy(g,0xaa4422, s*.3,s*.58,s*.1, s*.09,s*.6);
    bx(g,0xaa4422,-s*.4,s*1.4,s*.1, s*.18,.07,s*.18);
    for(let i=0;i<3;i++) bx(g,0x99aa99,-s*.4+i*s*.4,s*.22,s*.5+.01,s*.24,s*.24,.01);
    return g;
  },
  bridge(s){
    const g=new THREE.Group();
    bx(g,0x808878, 0,0,0, s*2.2,s*.12,s*.38);
    bx(g,0x606858,-s*.78,0,0, s*.2,s*.55,s*.2);
    bx(g,0x606858, s*.78,0,0, s*.2,s*.55,s*.2);
    bx(g,0x808878, 0,s*.55,0, s*2.2,.09*s,s*.07);
    return g;
  },
  stadium(s){
    const g=new THREE.Group();
    const sh=new THREE.Mesh(
      new THREE.CylinderGeometry(s,s*1.12,s*.42,16,1,true),
      new THREE.MeshLambertMaterial({color:0x8888cc,side:THREE.DoubleSide}));
    sh.position.y=s*.21; g.add(sh);
    const fl=new THREE.Mesh(new THREE.CircleGeometry(s*.92,16),
      new THREE.MeshLambertMaterial({color:0x44aa44}));
    fl.rotation.x=-Math.PI/2; fl.position.y=.06; g.add(fl);
    return g;
  },
  mountain(s){
    const g=new THREE.Group();
    cn(g,0x5a6848, 0,0,0, s,s*1.35, 6, 0);
    cn(g,0xeeeeff, 0,s*.76,0, s*.44,s*.62, 6, 0);
    return g;
  },
  continent(s){
    const g=new THREE.Group();
    bx(g,0x446028, 0,0,0, s*1.9,s*.16,s*1.35);
    bx(g,0x587840,-s*.28,s*.16,s*.12, s*.95,s*.1,s*.72);
    bx(g,0x224488, 0,0,-s*.9, s*1.25,.09,s*.65);
    return g;
  },
  ocean(s){
    const g=new THREE.Group();
    bx(g,0x1a3e88, 0,0,0, s*2.2,s*.07,s*1.7);
    const w=new THREE.Mesh(new THREE.PlaneGeometry(s*2.2,s*1.7,1,1),
      new THREE.MeshLambertMaterial({color:0x3366aa,transparent:true,opacity:.5}));
    w.rotation.x=-Math.PI/2; w.position.y=s*.08; g.add(w);
    return g;
  },
  cloud(s){
    const g=new THREE.Group();
    [[0,0,0,s*.72],[-.52*s,0,0,s*.52],[.52*s,0,0,s*.52],
     [-.3*s,.22*s,0,s*.46],[.3*s,.22*s,0,s*.46]].forEach(([x,y,z,r])=>
      sp(g,0xeef8ff,x,y+s*.55,z,r));
    return g;
  },
  satellite(s){
    const g=new THREE.Group();
    bx(g,0xaaaaaa, 0,s*.5,0, s*.42,s*.22,s*.42);
    bx(g,0x3355cc,-s*.85,s*.5,0, s*.84,s*.09,s*.3);
    bx(g,0x3355cc, s*.85,s*.5,0, s*.84,s*.09,s*.3);
    cy(g,0x888888, 0,0,0, s*.05,s*.52);
    return g;
  },
  crater(s){
    const g=new THREE.Group();
    const rim=new THREE.Mesh(new THREE.RingGeometry(s*.72,s,12),
      new THREE.MeshLambertMaterial({color:0x806040}));
    rim.rotation.x=-Math.PI/2; g.add(rim);
    bx(g,0x604828, 0,.02,0, s*.58,s*.07,s*.58);
    return g;
  },
  volcano(s){
    const g=new THREE.Group();
    cn(g,0x5a3818, 0,0,0, s,s*1.15, 8, 0);
    cn(g,0x1a1a1a, 0,s*.82,0, s*.3,s*.38, 8, 0);
    bx(g,0xff3300, 0,s*.92,0, s*.16,s*.18,s*.16);
    return g;
  },
  asteroid(s){
    const g=new THREE.Group();
    const m=new THREE.Mesh(new THREE.DodecahedronGeometry(s*.72,0),
      new THREE.MeshLambertMaterial({color:0x807060}));
    m.position.y=s*.52; g.add(m);
    return g;
  },
  iceberg(s){
    const g=new THREE.Group();
    cn(g,0xcce8ff, 0,0,0, s*.72,s,6,0);
    bx(g,0x88aacc, 0,-s*.22,0, s*1.25,s*.32,s*1.25);
    return g;
  },
};

const PART_COLS = {
  house:0xc8a060,doghouse:0xb07030,shed:0x7a5c30,tree:0x3a7830,silo:0xd0c8a0,
  shop:0xee5533,church:0xe8e0d0,tower:0x5878aa,skyscraper:0x5a6880,
  factory:0x7a8878,bridge:0x808878,stadium:0x4488cc,mountain:0x5a6848,
  continent:0x446028,ocean:0x1a3e88,cloud:0xeef8ff,satellite:0x3355cc,
  crater:0x806040,volcano:0x5a3818,asteroid:0x807060,iceberg:0xcce8ff,
};

// ══════════════════════════════════════════════════════════════
//  CHUNK GENERATION
//  Each chunk covers one road-grid cell.
//  Buildings are placed on both sides of each road edge.
// ══════════════════════════════════════════════════════════════
const objects = [];   // all live building objects
const MAX_OBJ = 90;

function generateChunk(chunkX, chunkZ){
  const key = chunkKey(chunkX, chunkZ);
  if(chunkCache.has(key)) return;
  chunkCache.set(key, []); // mark as generated

  const lvData = lv();
  const sp2 = lvData.roadSpacing;
  const gap = lvData.buildGap;
  const types = lvData.types;
  const sc = lvData.objScale;

  // chunk world origin
  const ox = chunkX * sp2;
  const oz = chunkZ * sp2;

  // Place buildings along each of the 4 edges of the chunk square
  // Each edge: place 2-4 buildings on each side of the road
  const edgeDefs = [
    // [along axis, fixed coord offset, facing sign]
    {axis:'x', fixedZ: oz,       side:1},
    {axis:'x', fixedZ: oz,       side:-1},
    {axis:'z', fixedX: ox,       side:1},
    {axis:'z', fixedX: ox,       side:-1},
  ];

  const count = 2 + Math.floor(srand(chunkX, chunkZ, 1) * 3); // 2-4 per side

  edgeDefs.forEach((edge, ei) => {
    for(let bi=0; bi<count; bi++){
      const seed1 = srand(chunkX*10+ei, chunkZ*10+bi, 2);
      const seed2 = srand(chunkX*10+ei, chunkZ*10+bi, 3);
      const seed3 = srand(chunkX*10+ei, chunkZ*10+bi, 4);

      const typeIdx = Math.floor(seed1 * types.length);
      const typeName = types[typeIdx];
      const builder = BUILDERS[typeName];
      if(!builder) continue;

      // size variation ±30%
      const sizeVar = 0.7 + seed2 * 0.6;
      const size = sc * sizeVar;

      // position along road edge
      const t = (bi + 0.5 + (seed3-0.5)*0.4) / count; // 0..1 along edge
      const roadOffset = gap + size * 0.6 + seed1 * gap * 0.4;

      let wx, wz;
      if(edge.axis === 'x'){
        wx = ox + t * sp2 - sp2/2;
        wz = edge.fixedZ + edge.side * roadOffset;
      } else {
        wx = (edge.fixedX || 0) + edge.side * roadOffset;
        wz = oz + t * sp2 - sp2/2;
      }

      if(objects.length >= MAX_OBJ) continue;

      const mesh = builder(size);
      mesh.position.set(wx, 0, wz);
      mesh.rotation.y = edge.axis==='x'
        ? (edge.side > 0 ? 0 : Math.PI) + (seed3-.5)*.3
        : (edge.side > 0 ? Math.PI/2 : -Math.PI/2) + (seed3-.5)*.3;
      scene.add(mesh);

      objects.push({
        mesh, size, typeName,
        cx:chunkX, cz:chunkZ,
        falling:false, fallTarget:null, absorbed:false,
        bobPhase: seed1 * Math.PI * 2,
      });
    }
  });
}

// Load chunks around camera position
function loadChunks(cx, cz){
  const sp2 = lv().roadSpacing;
  const chunkX = Math.round(cx / sp2);
  const chunkZ = Math.round(cz / sp2);
  for(let dx=-CHUNK_LOAD_R; dx<=CHUNK_LOAD_R; dx++){
    for(let dz=-CHUNK_LOAD_R; dz<=CHUNK_LOAD_R; dz++){
      generateChunk(chunkX+dx, chunkZ+dz);
    }
  }
}

// Remove objects that are very far away
function cullObjects(){
  const cullDist = Math.max(80, holeSize * 35 + 150);
  for(let i=objects.length-1; i>=0; i--){
    const o=objects[i];
    if(o.absorbed) continue;
    if(o.falling) continue;
    const dx=o.mesh.position.x-holeX, dz=o.mesh.position.z-holeZ;
    if(Math.sqrt(dx*dx+dz*dz) > cullDist){
      scene.remove(o.mesh);
      objects.splice(i,1);
      // Remove from cache so it can respawn
      const key = chunkKey(o.cx, o.cz);
      chunkCache.delete(key);
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════════════════════
const parts = [];
function spawnParts(x, z, col){
  for(let i=0;i<10;i++){
    const m=new THREE.Mesh(
      new THREE.BoxGeometry(.13,.13,.13),
      new THREE.MeshBasicMaterial({color:col,transparent:true}));
    m.position.set(x,.5,z); scene.add(m);
    parts.push({mesh:m,
      vx:(Math.random()-.5)*.28, vy:.08+Math.random()*.18,
      vz:(Math.random()-.5)*.28, life:35+Math.random()*20, maxLife:55});
  }
}

// ══════════════════════════════════════════════════════════════
//  HOLE VISUAL
// ══════════════════════════════════════════════════════════════
const holeGrp = new THREE.Group(); scene.add(holeGrp);
const diskM = new THREE.Mesh(new THREE.CircleGeometry(1,56),
  new THREE.MeshBasicMaterial({color:0x000000}));
diskM.rotation.x=-Math.PI/2; diskM.position.y=.05; holeGrp.add(diskM);
const rimM = new THREE.Mesh(new THREE.RingGeometry(1,1.13,56),
  new THREE.MeshBasicMaterial({color:0xf0e68c,side:THREE.DoubleSide}));
rimM.rotation.x=-Math.PI/2; rimM.position.y=.06; holeGrp.add(rimM);
for(let i=0;i<3;i++){
  const r=new THREE.Mesh(new THREE.RingGeometry(1.18+i*.27,1.32+i*.27,56),
    new THREE.MeshBasicMaterial({color:0x4a3f8a,transparent:true,
      opacity:.09-i*.025,side:THREE.DoubleSide}));
  r.rotation.x=-Math.PI/2; r.position.y=.02; r.userData.gi=i; holeGrp.add(r);
}
function updateHole(){
  diskM.scale.set(holeSize,holeSize,holeSize);
  holeGrp.children.forEach(c=>{
    if(c.userData.gi!=null){
      const b=1+c.userData.gi*.27;
      c.scale.set(holeSize*b,holeSize*b,holeSize*b);
    }
  });
  holeGrp.position.set(holeX,0,holeZ);
}

// ══════════════════════════════════════════════════════════════
//  ARROW — 3D cone pointing toward nearest absorbable object
// ══════════════════════════════════════════════════════════════
const arrowGrp = new THREE.Group(); scene.add(arrowGrp);
const arrowCone = new THREE.Mesh(
  new THREE.ConeGeometry(.38,.72,3),
  new THREE.MeshBasicMaterial({color:0xf0e68c,transparent:true,
    opacity:.9,side:THREE.DoubleSide}));
arrowCone.position.y = 0;
arrowGrp.add(arrowCone);
const arrowStem = new THREE.Mesh(
  new THREE.BoxGeometry(.12,.44,.08),
  new THREE.MeshBasicMaterial({color:0xf0e68c,transparent:true,opacity:.65}));
arrowStem.position.y = -.56; arrowGrp.add(arrowStem);
arrowGrp.visible = false;

let arrowTarget = null;
let arrowT = 0;

function findTarget(){
  let best=null, bestD=Infinity;
  objects.forEach(o=>{
    if(o.absorbed||o.falling||o.size>=holeSize) return;
    const dx=o.mesh.position.x-holeX, dz=o.mesh.position.z-holeZ;
    const d=Math.sqrt(dx*dx+dz*dz);
    if(d<bestD){bestD=d;best=o;}
  });
  return best;
}

function updateArrow(frame){
  if(frame%30===0||!arrowTarget||arrowTarget.absorbed||arrowTarget.falling)
    arrowTarget=findTarget();
  if(!arrowTarget){arrowGrp.visible=false;return;}
  arrowGrp.visible=true;
  arrowT+=.06;

  const tx=arrowTarget.mesh.position.x, tz=arrowTarget.mesh.position.z;
  const angle=Math.atan2(tx-holeX, tz-holeZ);
  const orbitR=holeSize*1.6+.25;
  const bobY=.55+holeSize*.22+Math.sin(arrowT)*.18;
  arrowGrp.position.set(holeX+Math.sin(angle)*orbitR, bobY, holeZ+Math.cos(angle)*orbitR);
  arrowGrp.rotation.set(0,angle,0);
  const s=Math.max(.45,Math.min(2.4,holeSize*.52+.38));
  arrowGrp.scale.setScalar(s);

  const op=.7+Math.sin(arrowT*1.8)*.28;
  const dx=tx-holeX, dz=tz-holeZ;
  const close=Math.sqrt(dx*dx+dz*dz)<holeSize*4.5;
  const col=close?0x88ff88:0xf0e68c;
  arrowCone.material.color.setHex(col); arrowCone.material.opacity=op;
  arrowStem.material.color.setHex(col); arrowStem.material.opacity=op*.72;
}

// ══════════════════════════════════════════════════════════════
//  LEVEL UP
// ══════════════════════════════════════════════════════════════
function doLevelUp(){
  if(lvupActive) return; lvupActive=true;
  lvIdx=Math.min(lvIdx+1,LEVELS.length-1);
  lvAbs=0;
  const lvData=lv();

  // Clear everything and rebuild for new level
  objects.forEach(o=>{ if(!o.absorbed) scene.remove(o.mesh); });
  objects.length=0;
  chunkCache.clear();
  arrowTarget=null;

  // Update visuals
  renderer.setClearColor(lvData.sky);
  scene.background=new THREE.Color(lvData.sky);
  scene.fog.color.setHex(lvData.sky);
  groundMat.color.setHex(lvData.ground);
  applyLevelLighting(lvData);
  buildRoadMeshes(lvData);

  document.getElementById('pb').style.background=lvData.barCol;
  document.getElementById('lv-name').textContent='◈ '+lvData.name+' ◈';
  document.getElementById('lu-t').textContent=lvData.name;
  document.getElementById('lu-s').textContent='— '+lvData.jp+' —';

  const lu=document.getElementById('lu');
  lu.style.opacity='1';
  setTimeout(()=>{lu.style.opacity='0';lvupActive=false;},2400);
  showMsg('◈ '+lvData.name+' ◈');
}

function showMsg(t){
  const m=document.getElementById('msg');
  m.textContent=t; m.style.opacity='1';
  setTimeout(()=>{m.style.opacity='0';},2000);
}

// ══════════════════════════════════════════════════════════════
//  JOYSTICK
// ══════════════════════════════════════════════════════════════
const jb=document.getElementById('jb'), js=document.getElementById('js');
let jDX=0,jDZ=0,jOX=0,jOY=0;
const JR=()=>Math.min(W(),H())*.14;
function sizeJoy(){
  const r=JR();
  jb.style.width=jb.style.height=r*2+'px';
  js.style.width=js.style.height=r*.38+'px';
}
sizeJoy();
function jMove(cx,cy){
  const dx=cx-jOX,dy=cy-jOY,dist=Math.sqrt(dx*dx+dy*dy),r=JR();
  const cl=Math.min(dist,r),nx=dist>0?dx/dist:0,ny=dist>0?dy/dist:0,ratio=cl/r;
  js.style.left=(jOX+nx*cl)+'px'; js.style.top=(jOY+ny*cl)+'px';
  const spd=Math.max(.12, holeSize*.13);
  jDX=nx*ratio*spd; jDZ=ny*ratio*spd;
}
function jStart(cx,cy){
  jOX=cx;jOY=cy;jDX=0;jDZ=0;
  jb.style.display='block';js.style.display='block';
  jb.style.left=cx+'px';jb.style.top=cy+'px';
  js.style.left=cx+'px';js.style.top=cy+'px';
}
function jEnd(){
  jDX=0;jDZ=0;jb.style.display='none';js.style.display='none';
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();jStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();jMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();jEnd();},{passive:false});
let md=false;
canvas.addEventListener('mousedown', e=>{md=true;jStart(e.clientX,e.clientY);});
canvas.addEventListener('mousemove', e=>{if(md)jMove(e.clientX,e.clientY);});
canvas.addEventListener('mouseup',   ()=>{md=false;jEnd();});
canvas.addEventListener('mouseleave',()=>{md=false;jEnd();});

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
const lv0=LEVELS[0];
renderer.setClearColor(lv0.sky);
scene.background=new THREE.Color(lv0.sky);
scene.fog=new THREE.Fog(lv0.sky, 40, 300);
applyLevelLighting(lv0);
document.getElementById('pb').style.background=lv0.barCol;

let camX=0,camZ=0,camH=camH4hole(holeSize);

// UI refs
const svEl=document.getElementById('sv'),hvEl=document.getElementById('hv');
const cvEl=document.getElementById('cv'),pbEl=document.getElementById('pb');
const psEl=document.getElementById('ps');

// ══════════════════════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════════════════════
let frame=0;
function loop(){
  requestAnimationFrame(loop);
  frame++;

  // move hole
  holeX+=jDX; holeZ+=jDZ;
  holeSize=Math.min(holeSize,lv().holeMax);
  updateHole();

  // camera
  const tH=camH4hole(holeSize);
  camH+=(tH-camH)*.05;
  camX+=(holeX-camX)*.08; camZ+=(holeZ-camZ)*.08;
  setCamera(camX,camZ,camH);

  // fog tracks camera height
  scene.fog.near=camH*1.4; scene.fog.far=camH*lv().fogF;

  // ground + roads
  groundMesh.position.x=Math.round(camX/GROUND_TILE)*GROUND_TILE;
  groundMesh.position.z=Math.round(camZ/GROUND_TILE)*GROUND_TILE;
  snapRoads(camX,camZ);

  // load chunks
  if(frame%20===0) loadChunks(holeX,holeZ);
  if(frame%90===0) cullObjects();

  // objects
  objects.forEach(o=>{
    if(o.absorbed) return;
    if(o.falling){
      o.mesh.position.x+=(o.fallTarget.x-o.mesh.position.x)*.14;
      o.mesh.position.z+=(o.fallTarget.z-o.mesh.position.z)*.14;
      o.mesh.position.y-=.22;
      o.mesh.scale.multiplyScalar(.905);
      o.mesh.rotation.y+=.2; o.mesh.rotation.x+=.1;
      if(o.mesh.position.y<-10||o.mesh.scale.x<.03){
        scene.remove(o.mesh); o.absorbed=true;
        if(arrowTarget===o) arrowTarget=null;
        holeSize=Math.min(holeSize+growAmt(o.size),lv().holeMax);
        score++; lvAbs++;
        svEl.textContent=score;
        hvEl.textContent=holeSize.toFixed(1);
        spawnParts(holeX,holeZ,PART_COLS[o.typeName]||0xffffff);
        const need=neededForNext();
        pbEl.style.width=Math.min(99,lvAbs/need*100)+'%';
        psEl.textContent=lvAbs+' / '+need;
        if(lvAbs>=need&&!lvupActive) doLevelUp();
        comboTimer=220;
      }
    } else {
      // slight ground bob
      o.mesh.position.y=Math.sin(frame*.014+o.bobPhase)*.04;
      // suction
      const dx=holeX-o.mesh.position.x,dz=holeZ-o.mesh.position.z;
      const d=Math.sqrt(dx*dx+dz*dz),sR=holeSize*3.5;
      if(d<sR&&o.size<holeSize){
        const f=(1-d/sR)*.055;
        o.mesh.position.x+=dx*f; o.mesh.position.z+=dz*f;
      }
    }
  });

  // auto-absorb
  if(frame%2===0){
    objects.forEach(o=>{
      if(o.absorbed||o.falling) return;
      const dx=o.mesh.position.x-holeX,dz=o.mesh.position.z-holeZ;
      if(o.size<holeSize&&Math.sqrt(dx*dx+dz*dz)<holeSize*.88){
        o.falling=true; o.fallTarget={x:holeX,z:holeZ}; comboTimer=220;
      }
    });
  }

  // particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.mesh.position.x+=p.vx;p.mesh.position.y+=p.vy;p.mesh.position.z+=p.vz;
    p.vy-=.005;p.life--;
    p.mesh.material.opacity=p.life/p.maxLife;
    if(p.life<=0){scene.remove(p.mesh);parts.splice(i,1);}
  }

  // combo
  if(comboTimer>0){comboTimer--;if(!comboTimer)combo=1;}
  cvEl.textContent='×'+combo;

  // arrow
  updateArrow(frame);

  // rim pulse
  const pulse=1+Math.sin(frame*.09)*.03;
  rimM.scale.set(holeSize*pulse,holeSize*pulse,holeSize*pulse);

  renderer.render(scene,camera);
}

// First chunk load then start
loadChunks(0,0);
loop();

window.addEventListener('resize',()=>{
  sizeJoy();
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});
setTimeout(()=>{document.getElementById('hint').style.opacity='0';},5000);
</script>
