<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VOID HOLE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    background:#0a0a0f; font-family:'Courier New',monospace;
    overflow:hidden; user-select:none; touch-action:none;
    width:100%; height:100%; position:fixed;
  }
  #canvas { display:block; width:100%; height:100%; touch-action:none; }

  #score-panel {
    position:fixed; top:env(safe-area-inset-top,12px); left:16px;
    padding-top:10px; color:#e8e0c8; font-size:9px;
    letter-spacing:0.2em; text-transform:uppercase; line-height:1.8;
    pointer-events:none;
  }
  #score-panel .val { font-size:22px; font-weight:bold; color:#f0e68c; display:block; line-height:1.1; }

  #combo {
    position:fixed; top:env(safe-area-inset-top,12px); right:16px;
    padding-top:10px; color:#c86464; font-size:9px;
    letter-spacing:0.2em; text-align:right; pointer-events:none;
  }
  #combo .cval { font-size:32px; font-weight:bold; display:block; line-height:1; text-shadow:0 0 16px #c8646488; }

  #size-bar-wrap {
    position:fixed; bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
    left:50%; transform:translateX(-50%); width:min(80vw,280px);
    text-align:center; color:#a09880; font-size:9px; letter-spacing:0.2em;
    pointer-events:none;
  }
  #size-label { margin-bottom:6px; color:#e8e0c8; }
  #size-bar-bg { width:100%; height:5px; background:#1a1a24; border-radius:3px; overflow:hidden; }
  #size-bar { height:100%; background:linear-gradient(90deg,#4a3f8a,#c86464,#f0e68c); border-radius:3px; transition:width 0.3s ease; width:5%; }

  #illusion-msg {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#f0e68c; font-size:13px; letter-spacing:0.2em; opacity:0;
    pointer-events:none; text-transform:uppercase; text-shadow:0 0 20px #f0e68c88;
    transition:opacity 0.5s; white-space:nowrap; text-align:center;
  }
  #hint {
    position:fixed; bottom:calc(env(safe-area-inset-bottom,0px) + 54px);
    left:50%; transform:translateX(-50%);
    color:#504838; font-size:9px; letter-spacing:0.15em;
    text-align:center; pointer-events:none; transition:opacity 1s; white-space:nowrap;
  }

  /* hole.io style joystick ghost — shows where finger is but hole moves relatively */
  #touch-ring {
    position:fixed; width:60px; height:60px; border-radius:50%;
    border:1.5px solid rgba(240,230,140,0.3);
    pointer-events:none; z-index:20;
    transform:translate(-50%,-50%); display:none;
    box-shadow:0 0 12px rgba(240,230,140,0.15);
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="touch-ring"></div>

<div id="score-panel">
  <span>SWALLOWED</span>
  <span class="val" id="score-val">0</span>
  <span style="margin-top:8px;display:block;">HOLE SIZE</span>
  <span class="val" id="hole-val">1.0</span>
</div>
<div id="combo">
  <span>COMBO</span>
  <span class="cval" id="combo-val">×1</span>
</div>
<div id="size-bar-wrap">
  <div id="size-label">◈ SCALE CYCLE ◈</div>
  <div id="size-bar-bg"><div id="size-bar"></div></div>
  <div style="margin-top:5px;color:#3a3428;">∞ LOOPS BACK AT MAX</div>
</div>
<div id="illusion-msg">◈ SCALE RESET ◈</div>
<div id="hint">ゆびを動かして穴を操作</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = false;
renderer.setClearColor(0x0a0a0f);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.018);

const camera = new THREE.PerspectiveCamera(55, W()/H(), 0.1, 300);
camera.position.set(0, 20, 20);
camera.lookAt(0, 0, 0);

// ─────────────────────────────────────────────
//  LIGHTS
// ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x2a2a4e, 2.5));
const dirLight = new THREE.DirectionalLight(0xfff5d0, 3);
dirLight.position.set(15, 30, 15);
scene.add(dirLight);
const ptLight = new THREE.PointLight(0x6644cc, 3, 50);
scene.add(ptLight);

// ─────────────────────────────────────────────
//  GROUND (pseudo-infinite)
// ─────────────────────────────────────────────
const TILE = 120;
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(TILE*4, TILE*4, 30, 30),
  new THREE.MeshLambertMaterial({ color:0x12121e })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
const grid = new THREE.GridHelper(TILE*4, 120, 0x1e1e30, 0x181828);
scene.add(grid);

// ─────────────────────────────────────────────
//  PALETTES
// ─────────────────────────────────────────────
const PALETTES = [
  [0xc86464,0xa84848,0x883030],[0x6480c8,0x4860a8,0x304888],
  [0x64c880,0x48a860,0x308840],[0xc8c064,0xa8a048,0x888030],
  [0xc864c8,0xa848a8,0x883088],[0x64c8c8,0x48a8a8,0x308888],
  [0xc89664,0xa87648,0x885630],[0xe8e0c8,0xc8c0a8,0xa8a088],
];

// ─────────────────────────────────────────────
//  HOLE STATE
// ─────────────────────────────────────────────
let holeSize = 1.0;   // world-space radius
let holeX = 0, holeZ = 0;
let score = 0, combo = 1, comboTimer = 0;

// Camera height is adjusted so that the hole always appears the
// same size on screen regardless of holeSize.
// If fovY = 55°, and we want the hole to subtend ~15% of screen height:
// screenFraction = 2 * holeSize / (2 * camDist * tan(fovY/2))  => camDist = holeSize / (screenFraction * tan(fovY/2))
const HOLE_SCREEN_FRACTION = 0.13;  // hole covers ~13% of screen height
const tanHalfFov = Math.tan((55 / 2) * Math.PI / 180);
const CAM_ANGLE = 50 * Math.PI / 180; // camera tilt angle from horizontal

function targetCamDist() {
  // distance from hole center to camera (along the diagonal)
  return holeSize / (HOLE_SCREEN_FRACTION * tanHalfFov);
}

// ─────────────────────────────────────────────
//  HOLE VISUAL
// ─────────────────────────────────────────────
const holeGroup = new THREE.Group();
scene.add(holeGroup);

const holeDisk = new THREE.Mesh(
  new THREE.CircleGeometry(1, 48),
  new THREE.MeshBasicMaterial({ color:0x000000 })
);
holeDisk.rotation.x = -Math.PI/2;
holeDisk.position.y = 0.01;
holeGroup.add(holeDisk);

const holeRim = new THREE.Mesh(
  new THREE.RingGeometry(1, 1.18, 48),
  new THREE.MeshBasicMaterial({ color:0xf0e68c, side:THREE.DoubleSide })
);
holeRim.rotation.x = -Math.PI/2;
holeRim.position.y = 0.02;
holeGroup.add(holeRim);

for (let i=0; i<3; i++) {
  const r = new THREE.Mesh(
    new THREE.RingGeometry(1.25+i*.35, 1.42+i*.35, 48),
    new THREE.MeshBasicMaterial({ color:0x4a3f8a, transparent:true, opacity:.12-i*.035, side:THREE.DoubleSide })
  );
  r.rotation.x = -Math.PI/2;
  r.position.y = 0.005;
  r.userData.gi = i;
  holeGroup.add(r);
}

function updateHoleVisual() {
  holeDisk.scale.set(holeSize, holeSize, holeSize);
  holeGroup.children.forEach(c => {
    if (c.userData.gi != null) {
      const b = 1 + c.userData.gi * 0.35;
      c.scale.set(holeSize*b, holeSize*b, holeSize*b);
    }
  });
  ptLight.position.set(holeX, 4, holeZ);
  ptLight.color.setHSL((holeSize * 0.08) % 1, 0.7, 0.5);
  ptLight.distance = holeSize * 12 + 20;
}

// ─────────────────────────────────────────────
//  VOXELS
// ─────────────────────────────────────────────
const voxels = [];
const MAX_V = 60;

function makeVoxelMesh(size, pal) {
  const g = new THREE.Group();
  // random-ish voxel cluster
  const blocks = [
    [0,0,0,1.0,0],[1,0,0,.8,1],[0,1,0,.8,1],[0,0,1,.8,2],
    [-1,0,0,.65,2],[1,1,0,.65,2],[0,1,1,.5,1],[-1,1,0,.5,2],
  ];
  blocks.forEach(([x,y,z,s,ci]) => {
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(s*size, s*size, s*size),
      new THREE.MeshLambertMaterial({ color:pal[ci] })
    );
    m.position.set(x*size*.85, y*size*.85, z*size*.85);
    g.add(m);
  });
  return g;
}

function spawnVoxel() {
  if (voxels.length >= MAX_V) return;
  const pal  = PALETTES[Math.floor(Math.random()*PALETTES.length)];
  const minS = Math.max(0.3, holeSize * 0.35);
  const maxS = holeSize * 3.0 + 1.5;
  const size = minS + Math.random() * (maxS - minS);
  const mesh = makeVoxelMesh(size, pal);

  // spawn in a ring around current hole position
  const ang = Math.random() * Math.PI * 2;
  const dist = holeSize * 4 + Math.random() * holeSize * 18 + 10;
  mesh.position.set(holeX + Math.cos(ang)*dist, size*.5, holeZ + Math.sin(ang)*dist);
  mesh.rotation.y = Math.random() * Math.PI * 2;
  scene.add(mesh);

  voxels.push({
    mesh, size, pal,
    vx:(Math.random()-.5)*.012,
    vz:(Math.random()-.5)*.012,
    rotSpeed:(Math.random()-.5)*.018,
    falling:false, fallTarget:null, absorbed:false,
    bobPhase:Math.random()*Math.PI*2,
  });
}

// ─────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────
const particles = [];
function spawnParticles(x, z, color) {
  for (let i=0; i<10; i++) {
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(.12,.12,.12),
      new THREE.MeshBasicMaterial({ color, transparent:true })
    );
    m.position.set(x, .5, z);
    scene.add(m);
    particles.push({ mesh:m,
      vx:(Math.random()-.5)*.22, vy:.06+Math.random()*.14, vz:(Math.random()-.5)*.22,
      life:40+Math.random()*25, maxLife:65 });
  }
}

// ─────────────────────────────────────────────
//  SCALE ILLUSION
// ─────────────────────────────────────────────
const SMAX = 12, SMIN = 1;
let loops = 0;

function scaleReset() {
  loops++;
  holeSize = SMIN;
  combo = Math.min(combo + 1, 9);
  const ratio = SMAX / SMIN;
  voxels.forEach(o => {
    o.size /= ratio;
    o.mesh.scale.setScalar(1 / ratio);
  });
  const msg = document.getElementById('illusion-msg');
  msg.style.opacity = '1';
  msg.textContent = ['◈ LOOP '+loops+' — SCALE RESET ◈','∞ THE VOID IS ENDLESS ∞','◈ YOU ARE SMALL AGAIN ◈'][loops%3];
  setTimeout(()=>{ msg.style.opacity='0'; }, 1800);
}

// ─────────────────────────────────────────────
//  INPUT  ← hole.io style
//
//  Mouse: hole tracks cursor directly (raycasted onto ground plane)
//  Touch: finger DELTA moves the hole (relative movement)
//         → place finger anywhere, drag to steer
// ─────────────────────────────────────────────
const touchRing = document.getElementById('touch-ring');
let prevTouchX = null, prevTouchY = null;
let mouseDown = false;

// Convert screen-space delta to world-space delta
// The camera looks down at ~50°. We need to map screen pixels → world units.
// Approximate: at camera distance D and given fov, one screen-height = 2*D*tan(fovY/2) world units.
function screenDeltaToWorld(dx, dy) {
  const dist  = targetCamDist();
  const worldH = 2 * dist * Math.sin(CAM_ANGLE) * tanHalfFov * (H() / Math.min(W(), H()));
  const worldW = worldH * (W() / H());
  // dy on screen → −z in world (forward), dx → x
  return {
    wx:  (dx / W()) * worldW * 2.2,
    wz: -(dy / H()) * worldH * 2.2,   // negative: drag down = move away from camera
  };
}

// Touch — relative delta
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  prevTouchX = t.clientX;
  prevTouchY = t.clientY;
  touchRing.style.display = 'block';
  touchRing.style.left = t.clientX + 'px';
  touchRing.style.top  = t.clientY + 'px';
}, { passive:false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (prevTouchX !== null) {
    const ddx = t.clientX - prevTouchX;
    const ddy = t.clientY - prevTouchY;
    const {wx, wz} = screenDeltaToWorld(ddx, ddy);
    holeX += wx;
    holeZ += wz;
  }
  prevTouchX = t.clientX;
  prevTouchY = t.clientY;
  touchRing.style.left = t.clientX + 'px';
  touchRing.style.top  = t.clientY + 'px';
}, { passive:false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  prevTouchX = null;
  prevTouchY = null;
  touchRing.style.display = 'none';
}, { passive:false });

// Mouse — also delta-based for consistency (hold & drag)
let lastMouseX = null, lastMouseY = null;
canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  if (lastMouseX !== null) {
    const ddx = e.clientX - lastMouseX;
    const ddy = e.clientY - lastMouseY;
    const {wx, wz} = screenDeltaToWorld(ddx, ddy);
    holeX += wx;
    holeZ += wz;
  }
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});
canvas.addEventListener('mouseup', () => { mouseDown = false; lastMouseX = null; });
canvas.addEventListener('mouseleave', () => { mouseDown = false; lastMouseX = null; });

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
for (let i=0; i<30; i++) spawnVoxel();

const scoreEl = document.getElementById('score-val');
const holeEl  = document.getElementById('hole-val');
const comboEl = document.getElementById('combo-val');
const sizeBar = document.getElementById('size-bar');

// smooth camera state
let camX = 0, camZ = 0, camDist = targetCamDist();

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;

  // ── hole position (already updated by input) ──
  holeGroup.position.set(holeX, 0, holeZ);
  updateHoleVisual();

  // ── camera: smoothly zoom out with holeSize ──
  const tDist = targetCamDist();
  camDist += (tDist - camDist) * 0.04;

  // camera follows hole on XZ, stays at fixed angle
  camX += (holeX - camX) * 0.07;
  camZ += (holeZ - camZ) * 0.07;

  const camH = camDist * Math.sin(CAM_ANGLE);
  const camBack = camDist * Math.cos(CAM_ANGLE);
  camera.position.set(camX, camH, camZ + camBack);
  camera.lookAt(camX, 0, camZ);

  // fog density scales with camera distance so far objects still fade
  scene.fog.density = 0.6 / camDist;

  // ── ground & grid tile follow ──
  ground.position.x = Math.round(camX / TILE) * TILE;
  ground.position.z = Math.round(camZ / TILE) * TILE;
  grid.position.x = ground.position.x;
  grid.position.z = ground.position.z;

  // ── voxels ──
  voxels.forEach(obj => {
    if (obj.absorbed) return;

    if (obj.falling) {
      obj.mesh.position.x += (obj.fallTarget.x - obj.mesh.position.x) * 0.13;
      obj.mesh.position.z += (obj.fallTarget.z - obj.mesh.position.z) * 0.13;
      obj.mesh.position.y -= 0.22;
      obj.mesh.scale.multiplyScalar(0.91);
      obj.mesh.rotation.y += 0.2;
      obj.mesh.rotation.x += 0.1;
      if (obj.mesh.position.y < -6 || obj.mesh.scale.x < 0.03) {
        scene.remove(obj.mesh);
        obj.absorbed = true;
        const grow = obj.size * 0.14;
        holeSize = Math.min(holeSize + grow, SMAX);
        score++;
        scoreEl.textContent = score;
        holeEl.textContent  = holeSize.toFixed(1);
        spawnParticles(holeX, holeZ, obj.pal[0]);
        const pct = (holeSize - SMIN) / (SMAX - SMIN);
        sizeBar.style.width = (5 + pct*95) + '%';
        if (holeSize >= SMAX - 0.1) scaleReset();
      }
    } else {
      // bob
      obj.mesh.position.y = obj.size*.5 + Math.sin(frame*.017 + obj.bobPhase)*.13;
      obj.mesh.rotation.y += obj.rotSpeed;
      obj.mesh.position.x += obj.vx;
      obj.mesh.position.z += obj.vz;

      // suction if smaller than hole and nearby
      const dx = holeX - obj.mesh.position.x;
      const dz = holeZ - obj.mesh.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      const sR = holeSize * 3.5;
      if (dist < sR && obj.size < holeSize) {
        const f = (1 - dist/sR) * 0.05;
        obj.mesh.position.x += dx * f;
        obj.mesh.position.z += dz * f;
      }
    }
  });

  // auto absorb
  if (frame % 3 === 0) {
    voxels.forEach(obj => {
      if (obj.absorbed || obj.falling) return;
      const dx = obj.mesh.position.x - holeX;
      const dz = obj.mesh.position.z - holeZ;
      if (obj.size < holeSize && Math.sqrt(dx*dx+dz*dz) < holeSize*.85) {
        obj.falling = true;
        obj.fallTarget = { x:holeX, z:holeZ };
        comboTimer = 200;
      }
    });
  }

  // particles
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.vy -= 0.005;
    p.life--;
    p.mesh.material.opacity = p.life / p.maxLife;
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i,1); }
  }

  // combo
  if (comboTimer > 0) { comboTimer--; if (!comboTimer) combo = 1; }
  comboEl.textContent = '×' + combo;

  // spawn maintenance
  if (frame % 90 === 0) {
    for (let i=voxels.length-1; i>=0; i--) {
      if (voxels[i].absorbed) voxels.splice(i,1);
    }
    const need = Math.min(MAX_V - voxels.length, 6);
    for (let i=0; i<need; i++) spawnVoxel();
  }

  // rim pulse
  const pulse = 1 + Math.sin(frame*.09) * 0.035;
  holeRim.scale.set(holeSize*pulse, holeSize*pulse, holeSize*pulse);

  renderer.render(scene, camera);
}

animate();

// resize
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

// hide hint
setTimeout(() => { document.getElementById('hint').style.opacity='0'; }, 5000);
</script>
</body>
</html>
