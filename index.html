<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VOID HOLE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    background:#0a0a0f; font-family:'Courier New',monospace;
    overflow:hidden; user-select:none; touch-action:none;
    width:100%; height:100%; position:fixed;
  }
  #canvas { display:block; width:100%; height:100%; touch-action:none; }

  #score-panel {
    position:fixed; top:env(safe-area-inset-top,16px); left:16px;
    padding-top:8px; color:#e8e0c8; font-size:9px;
    letter-spacing:0.2em; text-transform:uppercase; line-height:1.9;
    pointer-events:none;
  }
  #score-panel .val { font-size:24px; font-weight:bold; color:#f0e68c; display:block; line-height:1.1; }

  #combo {
    position:fixed; top:env(safe-area-inset-top,16px); right:16px;
    padding-top:8px; color:#c86464; font-size:9px;
    letter-spacing:0.2em; text-align:right; pointer-events:none;
  }
  #combo .cval { font-size:34px; font-weight:bold; display:block; line-height:1; text-shadow:0 0 16px #c8646488; }

  #size-bar-wrap {
    position:fixed; bottom:calc(env(safe-area-inset-bottom,0px) + 18px);
    left:50%; transform:translateX(-50%); width:min(78vw,260px);
    text-align:center; color:#a09880; font-size:9px; letter-spacing:0.18em;
    pointer-events:none;
  }
  #size-label { margin-bottom:5px; color:#e8e0c8; }
  #size-bar-bg { width:100%; height:4px; background:#1a1a24; border-radius:2px; overflow:hidden; }
  #size-bar { height:100%; background:linear-gradient(90deg,#4a3f8a,#c86464,#f0e68c); border-radius:2px; transition:width 0.25s ease; width:5%; }

  #illusion-msg {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#f0e68c; font-size:13px; letter-spacing:0.22em; opacity:0;
    pointer-events:none; text-transform:uppercase; text-shadow:0 0 20px #f0e68c88;
    transition:opacity 0.4s; white-space:nowrap; text-align:center;
  }
  #hint {
    position:fixed; bottom:calc(env(safe-area-inset-bottom,0px) + 52px);
    left:50%; transform:translateX(-50%);
    color:#504838; font-size:9px; letter-spacing:0.14em;
    pointer-events:none; transition:opacity 1.2s; white-space:nowrap;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="score-panel">
  <span>SWALLOWED</span>
  <span class="val" id="score-val">0</span>
  <span style="margin-top:6px;display:block;">HOLE SIZE</span>
  <span class="val" id="hole-val">1.0</span>
</div>
<div id="combo">
  <span>COMBO</span>
  <span class="cval" id="combo-val">×1</span>
</div>
<div id="size-bar-wrap">
  <div id="size-label">◈ SCALE CYCLE ◈</div>
  <div id="size-bar-bg"><div id="size-bar"></div></div>
  <div style="margin-top:4px;color:#2e2820;">∞ LOOPS BACK AT MAX</div>
</div>
<div id="illusion-msg">◈ LOOP ◈</div>
<div id="hint">画面をドラッグして穴を操作</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── renderer ──────────────────────────────────
const canvas = document.getElementById('canvas');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = false;
renderer.setClearColor(0x0a0a0f);

const scene = new THREE.Scene();
// No fog for top-down — it just grays everything out
// scene.fog = new THREE.FogExp2(0x0a0a0f, 0.012);

// ── TOP-DOWN camera ───────────────────────────
// Camera looks straight down. We only vary the HEIGHT (zoom).
// fovY = 50°.  At height H, visible world-height = 2*H*tan(25°).
// We want hole diameter (2*holeSize) to be ~HOLE_FRAC of screen height.
// => camHeight = holeSize / (HOLE_FRAC * tan(fovY/2))
const FOV = 50;
const TAN_HALF = Math.tan(FOV/2 * Math.PI/180);
const HOLE_FRAC = 0.13;  // hole takes ~13% of screen height

const camera = new THREE.PerspectiveCamera(FOV, W()/H(), 0.5, 500);
// point straight down
camera.position.set(0, 30, 0);
camera.lookAt(0, 0, 0);
camera.up.set(0, 0, -1);  // "up" on screen = -Z in world (north)

// ── lights ────────────────────────────────────
scene.add(new THREE.AmbientLight(0x303050, 3));
const dirLight = new THREE.DirectionalLight(0xfff8e8, 2.5);
dirLight.position.set(1, 3, 1).normalize();
scene.add(dirLight);
const ptLight = new THREE.PointLight(0x6644cc, 4, 80);
ptLight.position.set(0, 5, 0);
scene.add(ptLight);

// ── ground ────────────────────────────────────
const TILE = 150;
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(TILE*4, TILE*4, 40, 40),
  new THREE.MeshLambertMaterial({ color:0x0e0e1a })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
const grid = new THREE.GridHelper(TILE*4, 150, 0x1a1a2e, 0x141422);
scene.add(grid);

// ── palettes ──────────────────────────────────
const PALETTES = [
  [0xd46464,0xaa4444,0x883030],[0x6488d4,0x4464aa,0x304888],
  [0x64d480,0x44aa60,0x308840],[0xd4c864,0xaaa044,0x887830],
  [0xcc64cc,0xaa44aa,0x883088],[0x64cccc,0x44aaaa,0x308888],
  [0xd49664,0xaa7644,0x885630],[0xeee8d0,0xccc8a8,0xaaa888],
];

// ── hole state ────────────────────────────────
let holeSize = 1.0;
let holeX = 0, holeZ = 0;
let score = 0, combo = 1, comboTimer = 0;

function camHeight() {
  // camera height so the hole always occupies HOLE_FRAC of screen
  return holeSize / (HOLE_FRAC * TAN_HALF);
}

// ── hole visual ───────────────────────────────
const holeGroup = new THREE.Group();
scene.add(holeGroup);

const holeDisk = new THREE.Mesh(
  new THREE.CircleGeometry(1, 56),
  new THREE.MeshBasicMaterial({ color:0x000000 })
);
holeDisk.rotation.x = -Math.PI/2;
holeDisk.position.y = 0.02;
holeGroup.add(holeDisk);

const holeRim = new THREE.Mesh(
  new THREE.RingGeometry(1, 1.16, 56),
  new THREE.MeshBasicMaterial({ color:0xf0e68c, side:THREE.DoubleSide })
);
holeRim.rotation.x = -Math.PI/2;
holeRim.position.y = 0.03;
holeGroup.add(holeRim);

for (let i=0; i<4; i++) {
  const r = new THREE.Mesh(
    new THREE.RingGeometry(1.2+i*.32, 1.36+i*.32, 56),
    new THREE.MeshBasicMaterial({ color:0x4a3f8a, transparent:true, opacity:.11-i*.025, side:THREE.DoubleSide })
  );
  r.rotation.x = -Math.PI/2;
  r.position.y = 0.01;
  r.userData.gi = i;
  holeGroup.add(r);
}

function updateHoleVisual() {
  holeDisk.scale.set(holeSize, holeSize, holeSize);
  holeGroup.children.forEach(c => {
    if (c.userData.gi != null) {
      const b = 1 + c.userData.gi * 0.32;
      c.scale.set(holeSize*b, holeSize*b, holeSize*b);
    }
  });
  holeGroup.position.set(holeX, 0, holeZ);
  ptLight.position.set(holeX, 6, holeZ);
  ptLight.color.setHSL((holeSize*0.07)%1, 0.75, 0.55);
  ptLight.distance = Math.max(40, holeSize*14);
}

// ── voxels ────────────────────────────────────
const voxels = [];
const MAX_V = 55;

function makeVoxelMesh(size, pal) {
  const g = new THREE.Group();
  [
    [0,0,0,1.0,0],[1,0,0,.78,1],[0,1,0,.78,1],[0,0,1,.78,2],
    [-1,0,0,.62,2],[1,1,0,.62,2],[0,1,1,.50,1],
  ].forEach(([x,y,z,s,ci]) => {
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(s*size, s*size, s*size),
      new THREE.MeshLambertMaterial({ color:pal[ci] })
    );
    m.position.set(x*size*.82, y*size*.82, z*size*.82);
    g.add(m);
  });
  return g;
}

function spawnVoxel() {
  if (voxels.length >= MAX_V) return;
  const pal  = PALETTES[Math.floor(Math.random()*PALETTES.length)];
  const minS = Math.max(0.25, holeSize * 0.3);
  const maxS = holeSize * 3.2 + 1.5;
  const size = minS + Math.random() * (maxS - minS);
  const mesh = makeVoxelMesh(size, pal);
  const ang  = Math.random() * Math.PI * 2;
  const dist = holeSize * 5 + Math.random() * holeSize * 20 + 8;
  mesh.position.set(holeX + Math.cos(ang)*dist, size*.5, holeZ + Math.sin(ang)*dist);
  mesh.rotation.y = Math.random() * Math.PI * 2;
  scene.add(mesh);
  voxels.push({
    mesh, size, pal,
    vx:(Math.random()-.5)*.01, vz:(Math.random()-.5)*.01,
    rotSpeed:(Math.random()-.5)*.016,
    falling:false, fallTarget:null, absorbed:false,
    bobPhase:Math.random()*Math.PI*2,
  });
}

// ── particles ─────────────────────────────────
const particles = [];
function spawnParticles(x, z, color) {
  for (let i=0; i<10; i++) {
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(.13,.13,.13),
      new THREE.MeshBasicMaterial({ color, transparent:true })
    );
    m.position.set(x, .6, z);
    scene.add(m);
    particles.push({
      mesh:m,
      vx:(Math.random()-.5)*.24, vy:.07+Math.random()*.15, vz:(Math.random()-.5)*.24,
      life:38+Math.random()*22, maxLife:60,
    });
  }
}

// ── scale illusion ────────────────────────────
const SMAX=12, SMIN=1;
let loops=0;

function scaleReset() {
  loops++;
  holeSize = SMIN;
  combo = Math.min(combo+1, 9);
  const ratio = SMAX/SMIN;
  voxels.forEach(o => { o.size /= ratio; o.mesh.scale.setScalar(1/ratio); });
  const msg = document.getElementById('illusion-msg');
  msg.style.opacity = '1';
  msg.textContent = ['◈ LOOP '+loops+' — SCALE RESET ◈','∞ THE VOID IS ENDLESS ∞','◈ YOU ARE SMALL AGAIN ◈'][loops%3];
  setTimeout(()=>{ msg.style.opacity='0'; }, 1800);
}

// ── INPUT — top-down delta movement ───────────
// Screen X  →  world X  (right = right)
// Screen Y  →  world Z  (down on screen = +Z in world, i.e. "away from top")
// Camera looks straight down with up=-Z, so:
//   screen right (+dx) → world +X  ✓
//   screen down  (+dy) → world +Z  ✓  (no reversal needed)
//
// Speed scale: how many world-units per pixel.
// At camera height H, one screen pixel = (2*H*TAN_HALF / screenHeight) world units.

function pixelToWorld(dpx, dpy) {
  const h = camH;  // current smoothed camera height
  const scale = (2 * h * TAN_HALF) / H();
  return { wx: dpx * scale, wz: dpy * scale };
}

let prevTX = null, prevTY = null;
let mouseDown = false, prevMX = null, prevMY = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  prevTX = t.clientX;
  prevTY = t.clientY;
}, { passive:false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (prevTX !== null) {
    const { wx, wz } = pixelToWorld(t.clientX - prevTX, t.clientY - prevTY);
    holeX += wx;
    holeZ += wz;
  }
  prevTX = t.clientX;
  prevTY = t.clientY;
}, { passive:false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  prevTX = null; prevTY = null;
}, { passive:false });

canvas.addEventListener('mousedown', e => {
  mouseDown = true; prevMX = e.clientX; prevMY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (!mouseDown || prevMX === null) return;
  const { wx, wz } = pixelToWorld(e.clientX - prevMX, e.clientY - prevMY);
  holeX += wx; holeZ += wz;
  prevMX = e.clientX; prevMY = e.clientY;
});
canvas.addEventListener('mouseup',    () => { mouseDown=false; prevMX=null; });
canvas.addEventListener('mouseleave', () => { mouseDown=false; prevMX=null; });

// ── init ──────────────────────────────────────
for (let i=0; i<30; i++) spawnVoxel();

const scoreEl = document.getElementById('score-val');
const holeEl  = document.getElementById('hole-val');
const comboEl = document.getElementById('combo-val');
const sizeBar = document.getElementById('size-bar');

// smooth camera state
let camX = 0, camZ = 0, camH = camHeight();

// ── game loop ─────────────────────────────────
let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;

  // hole visual
  updateHoleVisual();

  // camera: top-down, height scales with holeSize
  const tH = camHeight();
  camH += (tH - camH) * 0.05;
  camX += (holeX - camX) * 0.08;
  camZ += (holeZ - camZ) * 0.08;

  camera.position.set(camX, camH, camZ);
  camera.lookAt(camX, 0, camZ);
  // keep camera "up" pointing toward -Z (screen top = world north)
  camera.up.set(0, 0, -1);

  // ground follows camera
  ground.position.x = Math.round(camX / TILE) * TILE;
  ground.position.z = Math.round(camZ / TILE) * TILE;
  grid.position.x = ground.position.x;
  grid.position.z = ground.position.z;

  // voxels
  voxels.forEach(obj => {
    if (obj.absorbed) return;
    if (obj.falling) {
      obj.mesh.position.x += (obj.fallTarget.x - obj.mesh.position.x) * 0.14;
      obj.mesh.position.z += (obj.fallTarget.z - obj.mesh.position.z) * 0.14;
      obj.mesh.position.y -= 0.24;
      obj.mesh.scale.multiplyScalar(0.90);
      obj.mesh.rotation.y += 0.22;
      obj.mesh.rotation.x += 0.11;
      if (obj.mesh.position.y < -6 || obj.mesh.scale.x < 0.03) {
        scene.remove(obj.mesh); obj.absorbed = true;
        holeSize = Math.min(holeSize + obj.size*0.14, SMAX);
        score++; scoreEl.textContent = score; holeEl.textContent = holeSize.toFixed(1);
        spawnParticles(holeX, holeZ, obj.pal[0]);
        sizeBar.style.width = (5 + ((holeSize-SMIN)/(SMAX-SMIN))*95) + '%';
        if (holeSize >= SMAX - 0.05) scaleReset();
      }
    } else {
      obj.mesh.position.y = obj.size*.5 + Math.sin(frame*.016+obj.bobPhase)*.12;
      obj.mesh.rotation.y += obj.rotSpeed;
      obj.mesh.position.x += obj.vx;
      obj.mesh.position.z += obj.vz;
      // suction
      const dx = holeX - obj.mesh.position.x;
      const dz = holeZ - obj.mesh.position.z;
      const dist = Math.sqrt(dx*dx+dz*dz);
      const sR = holeSize * 3.5;
      if (dist < sR && obj.size < holeSize) {
        const f = (1 - dist/sR) * 0.048;
        obj.mesh.position.x += dx*f;
        obj.mesh.position.z += dz*f;
      }
    }
  });

  // auto absorb
  if (frame % 2 === 0) {
    voxels.forEach(obj => {
      if (obj.absorbed || obj.falling) return;
      const dx = obj.mesh.position.x - holeX;
      const dz = obj.mesh.position.z - holeZ;
      if (obj.size < holeSize && Math.sqrt(dx*dx+dz*dz) < holeSize*.88) {
        obj.falling = true;
        obj.fallTarget = { x:holeX, z:holeZ };
        comboTimer = 200;
      }
    });
  }

  // particles
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
    p.vy -= 0.005; p.life--;
    p.mesh.material.opacity = p.life/p.maxLife;
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i,1); }
  }

  // combo
  if (comboTimer > 0) { comboTimer--; if (!comboTimer) combo=1; }
  comboEl.textContent = '×'+combo;

  // spawn maintenance
  if (frame % 80 === 0) {
    for (let i=voxels.length-1; i>=0; i--) { if (voxels[i].absorbed) voxels.splice(i,1); }
    const need = Math.min(MAX_V - voxels.length, 6);
    for (let i=0; i<need; i++) spawnVoxel();
  }

  // rim pulse
  const pulse = 1 + Math.sin(frame*.09)*.035;
  holeRim.scale.set(holeSize*pulse, holeSize*pulse, holeSize*pulse);

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

setTimeout(() => { document.getElementById('hint').style.opacity='0'; }, 4000);
</script>
</body>
</html>
